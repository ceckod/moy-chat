
name: Daily YouTube Stats Tracker

on:
  schedule:
    # 09:00 UTC всеки ден (GitHub cron не е прецизен до минута — може да закъснее с 5-30 мин, което е без значение за дневна статистика)
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # позволява и ръчно пускане от Actions таба, за тест

permissions:
  contents: write  # нужно, за да може workflow-ът да прави commit обратно в repo-то

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tracker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/track_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "cdb-stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/stats-history.json
          git diff --quiet --cached || git commit -m "📊 Daily stats snapshot ($(date -u +%Y-%m-%d))"
          git push
